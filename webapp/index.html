<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CryptoPulse<span>AI</span></h1>
            <div class="badge" id="premiumBadge">FREE</div>
        </div>
        <div class="tabs">
            <button class="tab active" data-tab="signals">📡 Signals</button>
            <button class="tab" data-tab="chart">📈 Chart</button>
            <button class="tab" data-tab="profile">👤 Profile</button>
        </div>
        <div id="signalsTab" class="tab-content active">
            <div class="symbol-selector" id="symbolSelector">
                <button data-sym="BTC/USDT" class="sym-btn active">BTC</button>
                <button data-sym="ETH/USDT" class="sym-btn">ETH</button>
                <button data-sym="SOL/USDT" class="sym-btn">SOL</button>
                <button data-sym="BNB/USDT" class="sym-btn">BNB</button>
            </div>
            <div class="signal-card" id="signalCard">
                <div class="signal-action" id="signalAction">--</div>
                <div class="signal-price" id="signalPrice">$0.00</div>
                <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill"></div></div>
                <div class="signal-reason" id="signalReason"></div>
                <button id="refreshSignal" class="btn-primary">⟳ Refresh</button>
            </div>
        </div>
        <div id="chartTab" class="tab-content">
            <div id="chartContainer" style="height: 300px;"></div>
            <div class="timeframe-selector">
                <button data-tf="1h" class="tf-btn active">1h</button>
                <button data-tf="4h" class="tf-btn">4h</button>
                <button data-tf="1d" class="tf-btn">1d</button>
            </div>
        </div>
        <div id="profileTab" class="tab-content">
            <div class="profile-card">
                <div class="stat-row"><span>User ID:</span><span id="profileUserId">-</span></div>
                <div class="stat-row"><span>Premium:</span><span id="profilePremium">-</span></div>
                <div class="stat-row"><span>Balance:</span><span id="profileBalance">$0</span></div>
                <div class="stat-row"><span>Referrals:</span><span id="profileRefs">0</span></div>
            </div>
            <button id="referralLinkBtn" class="btn-secondary">📋 Invite Link</button>
            <button id="subscribeBtn" class="btn-primary">💎 Buy Premium</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
